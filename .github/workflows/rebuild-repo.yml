name: Rebuild HyperHDR APT repo

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install reprepro

      - uses: actions/checkout@v6
        with:
          ref: upload
          path: upload
          persist-credentials: false
          fetch-depth: 0

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.KEY_PRIVATE }}
          passphrase: ${{ secrets.KEY_PASSWORD }}

      - name: Generate reprepro distributions config
        env:
          DEBIAN_CODENAMES: ${{ vars.DEBIAN_CODENAMES }} 
          UBUNTU_CODENAMES: ${{ vars.UBUNTU_CODENAMES }}
          GPG_SIGN_KEY: "DDF23213A68D1BC9D775479112760E0B0B6687C7"
        run: |
          mkdir -p upload/conf
          > upload/conf/distributions
          
          for codename in $DEBIAN_CODENAMES; do
            echo "Origin: hyperhdr.eu" >> upload/conf/distributions
            echo "Label: hyperhdr.eu" >> upload/conf/distributions
            echo "Codename: $codename" >> upload/conf/distributions
            echo "Architectures: amd64 arm64 armhf" >> upload/conf/distributions
            echo "Components: main" >> upload/conf/distributions
            echo "Description: Apt repository for HyperHDR" >> upload/conf/distributions
            echo "SignWith: $GPG_SIGN_KEY" >> upload/conf/distributions
            echo "" >> upload/conf/distributions
          done
          
          for codename in $UBUNTU_CODENAMES; do
            echo "Origin: hyperhdr.eu" >> upload/conf/distributions
            echo "Label: hyperhdr.eu" >> upload/conf/distributions
            echo "Codename: $codename" >> upload/conf/distributions
            echo "Architectures: amd64" >> upload/conf/distributions
            echo "Components: main" >> upload/conf/distributions
            echo "Description: Apt repository for HyperHDR" >> upload/conf/distributions
            echo "SignWith: $GPG_SIGN_KEY" >> upload/conf/distributions
            echo "" >> upload/conf/distributions
          done
          
          cat upload/conf/distributions

      - name: Import packages
        run: |
          pushd ./upload
          export REPREPRO_BASE_DIR=`pwd`
          popd
          
          if [ -d "./upload/pool" ]; then
            echo "Get old packages"
            pushd ./upload/dists
            while IFS= read -d $'\0' -r debianD ; do 
              debian=${debianD#'./'}
              mkdir -p ../repo/pool/"$debian"
              find ../pool -name "*$debian*.deb" -type f -exec mv -v {} ../repo/pool/"$debian"/ \;              
            done < <(find . -mindepth 1 -maxdepth 1 -type d -print0)            
            popd

            echo "Removing the old repo"
            rm -r ./upload/dists
            rm -r ./upload/pool
          fi
          
          pushd ./upload/repo/pool
          while IFS= read -d $'\0' -r debianD ; do 
            debian=${debianD#'./'}
            echo "Build Debian $debian repo branch"
            pushd $debianD
            while IFSS= read -d $'\0' -r package ; do 
              reprepro -V -S utils  -C main includedeb "$debian" "$package"
              rm "$package"
            done < <(find . -name '*.deb' -mindepth 1 -maxdepth 1 -type f -print0)
            popd
          done < <(find . -mindepth 1 -maxdepth 1 -type d -print0)
          popd

      - name: Commit files
        run: |
          pushd upload
          git add dists
          git add pool
          git add conf
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -a -m "Rebuild APT repo"
          popd

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: upload
          directory: upload

          
        
